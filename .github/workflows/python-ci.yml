name: Python CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint with Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check . --select F821,F822,F823,E9 --exclude venv

      - name: Compile all python files
        run: python -m compileall -q algo datastructure math_and_pattern problems z-problems contest_template
